<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — GolBody</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      background: #0D1F2D;
      color: #f0f6f4;
      font-family: Inter, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10918d, #0f734e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    p.subtitle {
      color: #8ab0a8;
      margin-bottom: 2rem;
    }
    input {
      display: block;
      width: 100%;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      background: #122433;
      border: 1px solid #1a3040;
      border-radius: 10px;
      color: #f0f6f4;
      font-size: 1rem;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }
    input:focus {
      outline: none;
      border-color: #10918d;
    }
    input::placeholder {
      color: #5a7a72;
    }
    button[type="submit"] {
      background: #10918d;
      color: #fff;
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-family: Inter, sans-serif;
    }
    button[type="submit"]:hover {
      background: #0d7a76;
    }
    #error-msg {
      color: #ff6b6b;
      display: none;
      font-size: 0.9rem;
      margin-top: 0.75rem;
    }
    .signup-text {
      margin-top: 1rem;
      color: #8ab0a8;
      font-size: 0.9rem;
    }
    .signup-text a {
      color: #10918d;
      text-decoration: none;
    }
    .signup-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>GolBody</h1>
    <p class="subtitle">Transforme ton physique en 1 clic</p>

    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required/>
      <input type="password" id="password" placeholder="Mot de passe" required/>
      <button type="submit">Se connecter</button>
      <p id="error-msg"></p>
    </form>

    <p class="signup-text">Pas de compte ? <a href="register.html">S'inscrire</a></p>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://quvqqxrfewrsbajsllzk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dnFxeHJmZXdyc2JhanNsbHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY4NzUzMzUsImV4cCI6MjA2MjQ1MTMzNX0.kSiwUpjHFE3wV6vJmCbYmMNv291rEW1SPgkWIO5W6G4'
    );

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('error-msg').textContent = 'Email ou mot de passe incorrect';
        document.getElementById('error-msg').style.display = 'block';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
