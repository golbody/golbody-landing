<script>
(function(){
var c=document.getElementById('cnv'),ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
var pts=[];
for(var i=0;i<45;i++) pts.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.4,s:Math.random()*.004+.001,ph:Math.random()*6.28});
function frame(t){
  ctx.clearRect(0,0,c.width,c.height);
  for(var i=0;i<pts.length;i++){
    var p=pts[i],op=((Math.sin(t*.001*p.s*1000+p.ph)+1)/2)*.55+.1;
    ctx.beginPath();ctx.arc(p.x*c.width,p.y*c.height,p.r,0,6.28);
    ctx.fillStyle='rgba(255,214,0,'+op+')';ctx.fill();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
